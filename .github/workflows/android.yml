name: Android CI Build

on:
  push:
    branches: [ "main", "master" ] # main 이나 master 브랜치에 push 될 때 실행
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 저장소 코드 체크아웃
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Java 환경 설정 (최신 Android Gradle Plugin 호환을 위해 JDK 17 빌드)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # Gradle 라이브러리 캐싱으로 다음 빌드 속도 향상

    # 3. Gradle 실행 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. 디버그 APK 빌드 실행
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 5. 빌드된 APK 파일 저장 및 업로드 (GitHub Actions 실행 결과창에서 다운로드 가능)
    - name: Upload Build Artifact (APK)
      uses: actions/upload-artifact@v4
      with:
        name: TeslaCoreConsole-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk


